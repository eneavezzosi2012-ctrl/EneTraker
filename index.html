function load(k,fb){try{const v=localStorage.getItem("enea_"+k);return v?JSON.parse(v):fb;}catch{return fb;}}
function save(k,v){
  try{localStorage.setItem("enea_"+k,JSON.stringify(v));}catch{}
  // Push asincrono su Firebase per l'utente loggato (best-effort, non blocca l'UI)
  try{
    const cu=localStorage.getItem("enea_current_user");
    if(cu&&window.__firestore&&window.__fbHelpers){
      const {doc,setDoc}=window.__fbHelpers;
      // Sanifica passando per JSON (Firestore non accetta undefined, Map, Set, ecc.)
      let safe;
      try{safe=JSON.parse(JSON.stringify(v));}catch{safe=null;}
      const ref=doc(window.__firestore,"users",cu,"data",k);
      setDoc(ref,{value:safe,updatedAt:Date.now()}).catch(()=>{});
    }
  }catch{}
}
// Helpers Firebase (login / migrazione iniziale / cancellazione account)
async function fbAwaitReady(){
  if(window.__fbReady)return;
  await new Promise(res=>{
    if(window.__fbReady)return res();
    window.addEventListener("fb-ready",()=>res(),{once:true});
    setTimeout(()=>res(),5000); // timeout safety
  });
}
async function fbUserExists(username){
  await fbAwaitReady();
  if(!window.__firestore)return false;
  const {doc,getDoc}=window.__fbHelpers;
  const ref=doc(window.__firestore,"users",username);
  const snap=await getDoc(ref);
  return snap.exists();
}
async function fbCreateUser(username){
  await fbAwaitReady();
  if(!window.__firestore)throw new Error("Firebase non disponibile");
  const {doc,setDoc}=window.__fbHelpers;
  const ref=doc(window.__firestore,"users",username);
  await setDoc(ref,{username,createdAt:Date.now()});
}
async function fbLoadAllUserData(username){
  await fbAwaitReady();
  if(!window.__firestore)return {};
  const {collection,getDocs}=window.__fbHelpers;
  const col=collection(window.__firestore,"users",username,"data");
  const snap=await getDocs(col);
  const out={};
  snap.forEach(d=>{out[d.id]=d.data().value;});
  return out;
}
async function fbDeleteUser(username){
  await fbAwaitReady();
  if(!window.__firestore)return;
  const {doc,deleteDoc,collection,getDocs}=window.__fbHelpers;
  // Cancella tutti i doc nella subcollection data
  try{
    const col=collection(window.__firestore,"users",username,"data");
    const snap=await getDocs(col);
    const dels=[];
    snap.forEach(d=>{dels.push(deleteDoc(d.ref));});
    await Promise.all(dels);
  }catch{}
  // Cancella il doc utente
  try{
    const ref=doc(window.__firestore,"users",username);
    await deleteDoc(ref);
  }catch{}
}
// Carica i dati Firebase nel localStorage (chiamato al login)
async function fbHydrateLocalStorage(username){
  const allData=await fbLoadAllUserData(username);
  // Pulisce vecchi dati enea_ (eccetto quelli di dispositivo)
  const keep=new Set(["enea_current_user","enea_local_accounts","enea_data_version","enea_fip_seeded_v22"]);
  const toRemove=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith("enea_")&&!keep.has(k))toRemove.push(k);
  }
  toRemove.forEach(k=>{try{localStorage.removeItem(k);}catch{}});
  // Scrive i dati Firebase nel localStorage
  Object.entries(allData).forEach(([k,v])=>{
    try{localStorage.setItem("enea_"+k,JSON.stringify(v));}catch{}
  });
}

function localDateStr(d){const x=d||new Date();const y=x.getFullYear();const m=String(x.getMonth()+1).padStart(2,"0");const dd=String(x.getDate()).padStart(2,"0");return y+"-"+m+"-"+dd;}

/* ── KEYFRAMES ANIMAZIONI ────────────────────────── */
@keyframes su{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
.su{animation:su .32s var(--ios) both;}
.tc.su > *{animation:su .42s var(--ios) both;}
.tc.su > *:nth-child(1){animation-delay:.02s;}
.tc.su > *:nth-child(2){animation-delay:.07s;}
.tc.su > *:nth-child(3){animation-delay:.12s;}
.tc.su > *:nth-child(4){animation-delay:.17s;}
.tc.su > *:nth-child(5){animation-delay:.22s;}
.tc.su > *:nth-child(6){animation-delay:.27s;}
.tc.su > *:nth-child(n+7){animation-delay:.32s;}

/* ── ACCESSIBILITÀ — rispetta prefers-reduced-motion */

    transition-duration:.001s !important;

}

function Donut({pct,color,size=86,stroke=8,label,sublabel,children}){
  const r=size/2-stroke;const c=2*Math.PI*r;const f=c*Math.min(pct,100)/100;
  const hasFill=pct>0;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:5}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg className="donut-svg" width={size} height={size} style={{transform:"rotate(-90deg)"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={f+" "+(c-f)} strokeLinecap="round" style={{transition:"stroke-dasharray .9s var(--spring)"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",filter:hasFill?"drop-shadow(0 0 6px "+color+"55)":"none"}}>
          {children||<span style={{fontFamily:"var(--font-mono)",fontSize:13,fontWeight:600,color}}>{Math.round(pct)}%</span>}
        </div>
      </div>
      {label&&<div style={{fontSize:11,fontWeight:600,color:"rgba(255,255,255,0.65)",letterSpacing:.3}}>{label}</div>}
      {sublabel&&<div style={{fontSize:10,color:"rgba(255,255,255,0.28)",textAlign:"center",maxWidth:78}}>{sublabel}</div>}
    </div>
  );
}

// ── BOTTOM SHEET MODAL: inserimento dati partita ─────────────────────────
function GameStatsModal({onSave,onCancel}){
  const STAT_KEYS_LOCAL=["Punti","Assist","Rimbalzi","Palle rubate","Falli"];
  const STAT_COLORS_LOCAL={
    "Punti":"#ff4d00","Assist":"#4db8ff","Rimbalzi":"#00da78",
    "Palle rubate":"#ffcc00","Falli":"#cc44ff",
  };
  const [skipped,setSkipped]=useState(false);
  const [vals,setVals]=useState(()=>{const o={};STAT_KEYS_LOCAL.forEach(k=>{o[k]="";});return o;});
  const [scoreMia,setScoreMia]=useState("");
  const [scoreAvv,setScoreAvv]=useState("");

  function setVal(k,v){setVals(p=>({...p,[k]:v}));}
  function setNA(k){setVals(p=>({...p,[k]:"NA"}));}
  function handleSave(){
    if(skipped){onSave({skipped:true,stats:{},score:null});return;}
    const stats={};
    STAT_KEYS_LOCAL.forEach(k=>{
      const v=vals[k];
      if(v==="NA"||v===""||v==null)stats[k]=null;
      else{const n=Number(v);stats[k]=isNaN(n)?null:n;}
    });
    let score=null;
    const sm=Number(scoreMia),sa=Number(scoreAvv);
    if(scoreMia!==""&&scoreAvv!==""&&!isNaN(sm)&&!isNaN(sa)){
      score={mia:sm,avv:sa};
    }
    onSave({skipped:false,stats,score});
  }

  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.7)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={onCancel}>
      <div onClick={e=>e.stopPropagation()}
        style={{background:"#0e0f1a",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"18px 18px 0 0",padding:"20px 16px",width:"100%",maxWidth:430,maxHeight:"88vh",overflowY:"auto"}}>
        <div style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.88)",marginBottom:6}}>🏀 Inserisci i dati della partita</div>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.4)",marginBottom:14}}>I dati saranno disponibili nella sezione Statistiche → Partite.</div>

        {/* Toggle partita saltata */}
        <button onClick={()=>setSkipped(s=>!s)}
          style={{width:"100%",padding:"10px 12px",borderRadius:11,border:"1px solid "+(skipped?"rgba(255,204,0,0.4)":"rgba(255,255,255,0.08)"),background:skipped?"rgba(255,204,0,0.08)":"rgba(255,255,255,0.04)",color:skipped?"#ffcc00":"rgba(255,255,255,0.6)",fontSize:12,fontWeight:600,cursor:"pointer",marginBottom:12,textAlign:"left",display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:14}}>{skipped?"☑":"☐"}</span>
          <span>Partita saltata (non sono sceso in campo)</span>
        </button>

        {!skipped&&(<>
          {/* Risultato finale */}
          <div style={{padding:"10px 11px",background:"rgba(255,77,0,0.04)",border:"1px solid rgba(255,77,0,0.18)",borderRadius:11,marginBottom:12}}>
            <div style={{fontSize:10,color:"#ff8c00",fontWeight:700,letterSpacing:.5,marginBottom:7}}>RISULTATO FINALE (opzionale)</div>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",fontWeight:600,marginBottom:3}}>Mia squadra</div>
                <input type="number" inputMode="numeric" value={scoreMia} onChange={e=>setScoreMia(e.target.value)} placeholder="0"
                  style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#ff8c00",padding:"7px 9px",fontSize:14,fontWeight:700,outline:"none",textAlign:"center",fontFamily:"var(--font-mono)"}}/>
              </div>
              <div style={{fontSize:18,color:"rgba(255,255,255,0.4)",fontWeight:700,marginTop:14}}>–</div>
              <div style={{flex:1}}>
                <div style={{fontSize:9,color:"rgba(255,255,255,0.4)",fontWeight:600,marginBottom:3}}>Avversari</div>
                <input type="number" inputMode="numeric" value={scoreAvv} onChange={e=>setScoreAvv(e.target.value)} placeholder="0"
                  style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"rgba(255,255,255,0.85)",padding:"7px 9px",fontSize:14,fontWeight:700,outline:"none",textAlign:"center",fontFamily:"var(--font-mono)"}}/>
              </div>
            </div>
          </div>

          {STAT_KEYS_LOCAL.map(k=>(
            <div key={k} style={{display:"flex",alignItems:"center",gap:8,marginBottom:9}}>
              <div style={{flex:1,minWidth:0,display:"flex",alignItems:"center",gap:8}}>
                <span style={{display:"inline-block",width:9,height:9,borderRadius:"50%",background:STAT_COLORS_LOCAL[k],flexShrink:0}}/>
                <span style={{fontSize:13,color:"rgba(255,255,255,0.78)",fontWeight:500}}>{k}</span>
              </div>
              <input type="number" inputMode="numeric" value={vals[k]==="NA"?"":vals[k]} onChange={e=>setVal(k,e.target.value)}
                placeholder={vals[k]==="NA"?"N/D":"0"}
                style={{width:70,background:"rgba(255,255,255,0.05)",border:"1px solid "+(vals[k]==="NA"?"rgba(255,255,255,0.2)":"rgba(255,255,255,0.08)"),borderRadius:8,color:vals[k]==="NA"?"rgba(255,255,255,0.4)":STAT_COLORS_LOCAL[k],padding:"7px 9px",fontSize:13,fontWeight:700,outline:"none",textAlign:"right",fontFamily:"var(--font-mono)"}}/>
              <button onClick={()=>setNA(k)}
                style={{padding:"7px 9px",borderRadius:8,border:"1px solid "+(vals[k]==="NA"?"rgba(255,255,255,0.25)":"rgba(255,255,255,0.07)"),background:vals[k]==="NA"?"rgba(255,255,255,0.08)":"rgba(255,255,255,0.03)",color:vals[k]==="NA"?"#fff":"rgba(255,255,255,0.4)",fontSize:10,fontWeight:700,cursor:"pointer",letterSpacing:.3,minWidth:42}}>N/D</button>
            </div>
          ))}
        </>)}

        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button onClick={onCancel} style={{flex:1,padding:"11px",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.55)",fontSize:13,cursor:"pointer",fontWeight:600}}>Annulla</button>
          <button onClick={handleSave} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#ff3500,#ff8800)",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",letterSpacing:.3}}>SALVA ✓</button>
        </div>
      </div>
    </div>
  );
}

// Default usato solo se l'utente non ha mai importato un calendario
const DEFAULT_FIP_PARTITE=[];

function normalizeTeamName(s){
  // Confronto case-insensitive, rimuove punteggiatura e spazi multipli per matching robusto
  return (s||"")
    .toUpperCase()
    .replace(/[.,'`'’“”"]/g," ")
    .replace(/\s+/g," ")
    .trim();
}

function parseFipPdfText(rawLines,teamName){
  // Prende un array di linee testuali (estratte dal PDF) e ritorna un array di partite
  // formato: {date, ora, avversario, casa, luogo, indirizzo, giornata, idGara?}
  // Strategia: scorre le linee, riconosce i pattern:
  //   "N Giornata - andata|ritorno del YYYY-MM-DD"  → ricorda giornata + data
  //   "<id 5-7 cifre>"                              → riconosce inizio partita (opzionale)
  //   "<SQUADRA A> <SQUADRA B> <orario o risultato>"→ partita
  //   Riga successiva = luogo + indirizzo
  const teamN=normalizeTeamName(teamName);
  if(!teamN)return [];
  const lines=rawLines.map(l=>l.trim()).filter(l=>l.length>0);
  const out=[];
  let currentGiornata=null;
  let currentDate=null;
  // Regex per giornata "1 Giornata - andata del 2026-05-03"
  const reGiornata=/^(\d+)\s*Giornata\s*-\s*(andata|ritorno)\s*del\s*(\d{4}-\d{2}-\d{2})/i;
  // Regex risultato (inseriti) "81 - 67"  oppure orario "06/05/26 - 21:00"
  const reResult=/^(\d{1,3})\s*-\s*(\d{1,3})$/;
  const reTime=/(\d{1,2}\/\d{1,2}\/\d{2,4})\s*-\s*(\d{1,2}:\d{2})/;
  const reTimeOnly=/^(\d{1,2}):(\d{2})$/;

  for(let i=0;i<lines.length;i++){
    const ln=lines[i];
    const mg=ln.match(reGiornata);
    if(mg){
      currentGiornata=mg[1]+"ª "+mg[2];
      currentDate=mg[3];
      continue;
    }
    if(!currentDate)continue;

    // Cerca squadre: una riga che contiene la teamN (normalizzata).
    // La riga FIP-typical è:  "<HOME>   <AWAY>   <orario o risultato>"
    // Le squadre possono essere lunghe. Splittiamo eliminando doppi spazi e
    // confrontando se contengono il nome squadra.
    const upper=normalizeTeamName(ln);
    if(!upper.includes(teamN))continue;

    // Estrazione: prendi i dati. Tentiamo di capire chi è casa/trasferta.
    // FIP convention: la squadra di casa è la prima, l'ospite la seconda.
    // Possibili separatori: 2+ spazi, tab. Splittiamo per 2+ spazi.
    let parts=ln.split(/\s{2,}|\t+/).map(p=>p.trim()).filter(p=>p.length>0);
    // Se per qualche motivo non funziona (PDF.js a volte ritorna single-space),
    // proviamo a cercare il punto in cui finisce la prima squadra (4 caratteri di
    // nome dopo aver trovato il match)
    let homeText="",awayText="",extra="";
    if(parts.length>=2){
      homeText=parts[0];
      awayText=parts[1];
      extra=parts.slice(2).join(" ");
    } else {
      // Fallback: dividi al primo " - " o cercando nome
      const idx=upper.indexOf(teamN);
      // Heuristic: niente da fare, salta
      continue;
    }

    // Determina casa/trasferta
    const homeN=normalizeTeamName(homeText);
    const awayN=normalizeTeamName(awayText);
    let casa=null;
    if(homeN.includes(teamN)&&!awayN.includes(teamN))casa=true;
    else if(awayN.includes(teamN)&&!homeN.includes(teamN))casa=false;
    else continue;

    const avversario=casa?awayText:homeText;

    // Cerca orario nelle parti rimanenti
    let ora="";
    let risultato=null;
    const mr=extra.match(reResult);
    if(mr){risultato={mia:casa?Number(mr[1]):Number(mr[2]),avv:casa?Number(mr[2]):Number(mr[1])};}
    const mt=extra.match(reTime);
    if(mt)ora=mt[2];
    else {
      const mto=extra.match(reTimeOnly);
      if(mto)ora=mto[1].padStart(2,"0")+":"+mto[2];
    }

    // La riga successiva è di solito luogo+indirizzo
    let luogo="",indirizzo="";
    if(i+1<lines.length){
      const nxt=lines[i+1];
      // Skippa se è un'altra "Giornata"
      if(!reGiornata.test(nxt)){
        // Tipico: "PALADREAM ROSSO - Via Belli 1 PISA (PI)"
        const sep=nxt.indexOf(" - ");
        if(sep>=0){luogo=nxt.slice(0,sep).trim();indirizzo=nxt.slice(sep+3).trim();}
        else {luogo=nxt;}
      }
    }

    out.push({
      date:currentDate,
      ora:ora||"",
      avversario:avversario.replace(/\s+/g," ").trim(),
      casa,
      luogo,
      indirizzo,
      giornata:currentGiornata||"",
      risultato,
    });
  }
  return out;
}

async function extractTextFromPdf(file){
  const lib=await window.__loadPdfJs();
  const buf=await file.arrayBuffer();
  const pdf=await lib.getDocument({data:buf}).promise;
  const allLines=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    // Raggruppa items per riga in base a y
    const byLine={};
    tc.items.forEach(it=>{
      const y=Math.round(it.transform[5]);
      if(!byLine[y])byLine[y]=[];
      byLine[y].push({x:it.transform[4],s:it.str});
    });
    Object.keys(byLine)
      .map(Number).sort((a,b)=>b-a) // y decrescente = top→bottom
      .forEach(y=>{
        const sorted=byLine[y].sort((a,b)=>a.x-b.x);
        // Ricostruzione: separa con doppio spazio se il gap x è > 8
        let line="";
        for(let i=0;i<sorted.length;i++){
          if(i>0){
            const gap=sorted[i].x-(sorted[i-1].x+(sorted[i-1].s.length*5));
            if(gap>8)line+="  ";
            else line+=" ";
          }
          line+=sorted[i].s;
        }
        allLines.push(line);
      });
  }
  return allLines;
}

// ── ARCHIVIO STAGIONI ────────────────────────────────────────────────────
function SeasonsArchive({onClose}){
  const [seasons,setSeasons]=useState(()=>{
    // Costruisce la lista stagioni dall'archivio salvato
    const arch=load("seasons_archive",[]);
    return arch;
  });
  const [renameId,setRenameId]=useState(null);
  const [renameText,setRenameText]=useState("");
  const [expandId,setExpandId]=useState(null);

  function saveSeasonsToStore(updated){
    setSeasons(updated);
    save("seasons_archive",updated);
  }

  function doRename(id){
    if(!renameText.trim())return;
    saveSeasonsToStore(seasons.map(s=>s.id===id?{...s,label:renameText.trim()}:s));
    setRenameId(null);setRenameText("");
  }

  function doDelete(id){
    if(!confirm("Elimina questa stagione? Le statistiche associate verranno rimosse."))return;
    saveSeasonsToStore(seasons.filter(s=>s.id!==id));
  }

  const STAT_KEYS_S=["Punti","Assist","Rimbalzi","Palle rubate","Falli"];

  function getSeasonStats(seasonId){
    const games=load("game_stats",[]);
    const sg=games.filter(g=>g.season===seasonId&&!g.skipped);
    if(!sg.length)return null;
    const avgs={};
    STAT_KEYS_S.forEach(k=>{
      const vs=sg.map(g=>g.stats&&g.stats[k]!==null&&g.stats[k]!==undefined?g.stats[k]:null).filter(v=>v!==null);
      avgs[k]=vs.length>0?(vs.reduce((a,b)=>a+b,0)/vs.length).toFixed(1):"-";
    });
    const wins=sg.filter(g=>g.score&&g.score.mia>g.score.avv).length;
    const losses=sg.filter(g=>g.score&&g.score.mia<g.score.avv).length;
    return{avgs,wins,losses,total:sg.length,totalWithSkipped:games.filter(g=>g.season===seasonId).length};
  }

  if(!seasons.length){
    return(
      <div>
        <button onClick={onClose} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"rgba(255,255,255,0.5)",fontSize:12,padding:"6px 12px",cursor:"pointer",marginBottom:16}}>← Indietro</button>
        <div style={{textAlign:"center",padding:"30px 0",color:"rgba(255,255,255,0.25)",fontSize:13}}>
          <div style={{fontSize:32,marginBottom:10}}>📦</div>
          <div>Nessuna stagione passata archiviata.</div>
          <div style={{fontSize:11,marginTop:6,lineHeight:1.5}}>Le stagioni vengono salvate automaticamente quando importi un nuovo calendario PDF.</div>
        </div>
      </div>
    );
  }

  return(
    <div>
      <button onClick={onClose} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"rgba(255,255,255,0.5)",fontSize:12,padding:"6px 12px",cursor:"pointer",marginBottom:16}}>← Indietro</button>
      <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",fontWeight:600,letterSpacing:.8,marginBottom:12}}>STAGIONI ARCHIVIATE · {seasons.length}</div>
      {seasons.slice().reverse().map(s=>{
        const stats=getSeasonStats(s.id);
        const isExp=expandId===s.id;
        const isRen=renameId===s.id;
        return(
          <div key={s.id} style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,marginBottom:10,overflow:"hidden"}}>
            {/* Header stagione */}
            <div style={{padding:"12px 14px",display:"flex",alignItems:"center",gap:10}}>
              <div style={{flex:1,minWidth:0}}>
                {isRen?(
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    <input autoFocus value={renameText} onChange={e=>setRenameText(e.target.value)}
                      onKeyDown={e=>{if(e.key==="Enter")doRename(s.id);if(e.key==="Escape"){setRenameId(null);setRenameText("");}}}
                      style={{flex:1,background:"rgba(255,255,255,0.07)",border:"1px solid rgba(255,77,0,0.35)",borderRadius:8,color:"#fff",padding:"6px 10px",fontSize:13,outline:"none",fontFamily:"inherit"}}/>
                    <button onClick={()=>doRename(s.id)} style={{background:"rgba(255,77,0,0.15)",border:"1px solid rgba(255,77,0,0.3)",borderRadius:7,color:"#ff6a20",fontSize:11,padding:"5px 10px",cursor:"pointer",fontWeight:700}}>✓</button>
                    <button onClick={()=>{setRenameId(null);setRenameText("");}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:7,color:"rgba(255,255,255,0.35)",fontSize:11,padding:"5px 10px",cursor:"pointer"}}>✕</button>
                  </div>
                ):(
                  <>
                    <div style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.88)"}}>{s.label||("Stagione "+s.id)}</div>
                    {s.archivedAt&&<div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:2}}>Archiviata il {new Date(s.archivedAt).toLocaleDateString("it-IT",{day:"numeric",month:"long",year:"numeric"})}</div>}
                  </>
                )}
              </div>
              {!isRen&&<div style={{display:"flex",gap:5,flexShrink:0}}>
                <button onClick={()=>{setRenameId(s.id);setRenameText(s.label||("Stagione "+s.id));}} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:7,color:"rgba(255,255,255,0.35)",fontSize:11,padding:"5px 8px",cursor:"pointer"}}>✏️</button>
                <button onClick={()=>setExpandId(isExp?null:s.id)} style={{background:isExp?"rgba(255,77,0,0.1)":"rgba(255,255,255,0.05)",border:"1px solid "+(isExp?"rgba(255,77,0,0.25)":"rgba(255,255,255,0.09)"),borderRadius:7,color:isExp?"#ff6a20":"rgba(255,255,255,0.35)",fontSize:11,padding:"5px 10px",cursor:"pointer",fontWeight:600}}>
                  {isExp?"▲ Chiudi":"▼ Dettagli"}
                </button>
                <button onClick={()=>doDelete(s.id)} style={{background:"rgba(255,59,48,0.08)",border:"1px solid rgba(255,59,48,0.2)",borderRadius:7,color:"#ff3b30",fontSize:11,padding:"5px 8px",cursor:"pointer"}}>🗑</button>
              </div>}
            </div>

            {/* Dettagli espansi */}
            {isExp&&(
              <div style={{borderTop:"1px solid rgba(255,255,255,0.05)",padding:"12px 14px"}}>
                {/* Statistiche medie */}
                {stats?(
                  <>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:600,letterSpacing:.5,marginBottom:8}}>📊 STATISTICHE MEDIE · {stats.total} partite giocate</div>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                      {STAT_KEYS_S.map(k=>(
                        <div key={k} style={{flex:"1 1 80px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                          <div style={{fontSize:18,fontWeight:700,color:"#ff6a20",fontFamily:"'JetBrains Mono'"}}>{stats.avgs[k]}</div>
                          <div style={{fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:2,fontWeight:600}}>{k.toUpperCase()}</div>
                        </div>
                      ))}
                    </div>
                    {(stats.wins+stats.losses>0)&&(
                      <div style={{display:"flex",gap:8,marginBottom:10}}>
                        <div style={{flex:1,background:"rgba(0,218,120,0.07)",border:"1px solid rgba(0,218,120,0.18)",borderRadius:10,padding:"8px",textAlign:"center"}}>
                          <div style={{fontSize:20,fontWeight:700,color:"#00da78"}}>{stats.wins}</div>
                          <div style={{fontSize:9,color:"rgba(0,218,120,0.6)",fontWeight:600}}>VITTORIE</div>
                        </div>
                        <div style={{flex:1,background:"rgba(255,59,48,0.07)",border:"1px solid rgba(255,59,48,0.18)",borderRadius:10,padding:"8px",textAlign:"center"}}>
                          <div style={{fontSize:20,fontWeight:700,color:"#ff3b30"}}>{stats.losses}</div>
                          <div style={{fontSize:9,color:"rgba(255,59,48,0.6)",fontWeight:600}}>SCONFITTE</div>
                        </div>
                        <div style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,padding:"8px",textAlign:"center"}}>
                          <div style={{fontSize:20,fontWeight:700,color:"rgba(255,255,255,0.7)"}}>{stats.total-(stats.wins+stats.losses)}</div>
                          <div style={{fontSize:9,color:"rgba(255,255,255,0.3)",fontWeight:600}}>PAREGGI/N.R.</div>
                        </div>
                      </div>
                    )}
                  </>
                ):(
                  <div style={{fontSize:12,color:"rgba(255,255,255,0.25)",textAlign:"center",padding:"10px 0",marginBottom:10}}>Nessuna statistica registrata per questa stagione.</div>
                )}

                {/* Partite della stagione */}
                {Array.isArray(s.matches)&&s.matches.length>0&&(
                  <>
                    <div style={{fontSize:10,color:"rgba(255,255,255,0.3)",fontWeight:600,letterSpacing:.5,marginBottom:8}}>📅 PARTITE · {s.matches.length}</div>
                    <div style={{maxHeight:260,overflowY:"auto"}}>
                      {s.matches.map((p,i)=>{
                        const games=load("game_stats",[]);
                        const gameEntry=games.find(g=>g.season===s.id&&g.date===p.date&&g.avversario===p.avversario);
                        return(
                          <div key={i} style={{padding:"8px 10px",marginBottom:6,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:10}}>
                            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:4}}>
                              <div style={{fontSize:11,color:"rgba(255,255,255,0.55)",fontWeight:600}}>{p.date} · {p.casa?"🏠 Casa":"✈️ Trasferta"}</div>
                              {gameEntry?.score&&<div style={{fontSize:11,fontWeight:700,color:gameEntry.score.mia>gameEntry.score.avv?"#00da78":gameEntry.score.mia<gameEntry.score.avv?"#ff3b30":"#ffcc00",fontFamily:"'JetBrains Mono'"}}>{gameEntry.score.mia}–{gameEntry.score.avv}</div>}
                            </div>
                            <div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.8)"}}>vs {p.avversario}</div>
                            {gameEntry&&!gameEntry.skipped&&gameEntry.stats&&(
                              <div style={{display:"flex",gap:8,marginTop:5,flexWrap:"wrap"}}>
                                {STAT_KEYS_S.filter(k=>gameEntry.stats[k]!==null&&gameEntry.stats[k]!==undefined).map(k=>(
                                  <span key={k} style={{fontSize:10,color:"rgba(255,255,255,0.4)",fontWeight:500}}>
                                    <span style={{color:"#ff6a20",fontWeight:700}}>{gameEntry.stats[k]}</span> {k}
                                  </span>
                                ))}
                              </div>
                            )}
                            {gameEntry?.skipped&&<div style={{fontSize:10,color:"#ffcc00",marginTop:4}}>⚡ Non sceso in campo</div>}
                          </div>
                        );
                      })}
                    </div>
                  </>
                )}
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function PartiteCalendar(){
  const [teamName,setTeamName]=useState(()=>load("fip_team_name","Cerreto Basket"));
  const [partite,setPartite]=useState([]);
  const [showArchive,setShowArchive]=useState(false);
  useEffect(()=>{
    // Carica dal localStorage ma ignora i dati legacy (partite pre-importazione PDF)
    const stored=load("fip_matches",null);
    if(Array.isArray(stored)&&stored.length>0){
      // Controlla se sono dati importati da PDF (hanno il campo 'avversario')
      // o dati legacy hard-coded (hanno il campo 'opponent')
      const isLegacy=stored.some(p=>p.opponent&&!p.avversario);
      if(!isLegacy)setPartite(stored);
      else save("fip_matches",[]); // pulisce i dati legacy da Firebase/localStorage
    }
  },[]);
  const [importing,setImporting]=useState(false);
  const [importMsg,setImportMsg]=useState(null);
  const [previewMatches,setPreviewMatches]=useState(null); // partite estratte ma non ancora confermate
  const fileInputRef=useRef(null);

  useEffect(()=>{save("fip_team_name",teamName);},[teamName]);
  useEffect(()=>{save("fip_matches",partite);},[partite]);

  function getArrivoOra(ora){
    if(!ora||!/^\d{1,2}:\d{2}$/.test(ora))return "";
    const[h,m]=ora.split(":").map(Number);const tot=h*60+m-45;
    if(tot<0)return "";
    return `${String(Math.floor(tot/60)).padStart(2,"0")}:${String(tot%60).padStart(2,"0")}`;
  }
  function fmtDate(d){const dt=new Date(d+"T12:00:00");return dt.toLocaleDateString("it-IT",{weekday:"long",day:"numeric",month:"long"});}
  const today=localDateStr();

  async function handleFile(e){
    const f=e.target.files&&e.target.files[0];
    if(!f)return;
    setImporting(true);setImportMsg(null);setPreviewMatches(null);
    try{
      const lines=await extractTextFromPdf(f);
      const parsed=parseFipPdfText(lines,teamName);
      if(parsed.length===0){
        setImportMsg({ok:false,text:`Nessuna partita trovata per "${teamName}". Controlla il nome squadra e il PDF.`});
      } else {
        setPreviewMatches(parsed);
        setImportMsg({ok:true,text:`✓ Trovate ${parsed.length} partite. Controlla e conferma per sostituire il calendario.`});
      }
    }catch(err){
      console.error("[FIP] errore parsing:",err);
      setImportMsg({ok:false,text:"Errore lettura PDF: "+(err.message||err)});
    } finally {
      setImporting(false);
      if(fileInputRef.current)fileInputRef.current.value="";
    }
  }

  function confirmImport(){
    if(!previewMatches)return;
    // Archivia la stagione corrente: incrementa il "current_season" in modo che
    // le partite vecchie restino visibili nelle stats sotto la stagione precedente
    try{
      const curSeason=load("current_season",1);
      const newSeason=curSeason+1;
      save("current_season",newSeason);
      // Marca le partite (game_stats) con la stagione vecchia se non hanno season
      const games=load("game_stats",[]);
      const updated=games.map(g=>g.season?g:{...g,season:curSeason});
      save("game_stats",updated);
      // Salva la stagione archiviata nell'archivio stagioni (con le partite)
      const arch=load("seasons_archive",[]);
      const curPartite=load("fip_matches",[]);
      if(Array.isArray(curPartite)&&curPartite.length>0){
        const existing=arch.find(s=>s.id===curSeason);
        if(!existing){
          arch.push({id:curSeason,label:"Stagione "+curSeason,archivedAt:Date.now(),matches:curPartite});
          save("seasons_archive",arch);
        }
      }
    }catch{}
    // Sostituisce il calendario partite
    setPartite(previewMatches);
    setPreviewMatches(null);
    setImportMsg({ok:true,text:"✓ Calendario sostituito. Nuova stagione attiva. Le statistiche precedenti restano archiviate."});
  }
  function cancelImport(){
    setPreviewMatches(null);
    setImportMsg(null);
  }

  if(showArchive)return<SeasonsArchive onClose={()=>setShowArchive(false)}/>;

  return(
    <div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
        <div style={{fontSize:11,color:"rgba(255,255,255,0.28)",lineHeight:1.5,flex:1}}>
          Calendario partite della tua squadra. A fine stagione importa il nuovo PDF FIP.
        </div>
        <button onClick={()=>setShowArchive(true)}
          style={{flexShrink:0,marginLeft:10,background:"rgba(160,120,255,0.12)",border:"1px solid rgba(160,120,255,0.3)",borderRadius:10,color:"#c0a0ff",fontSize:11,fontWeight:700,padding:"7px 11px",cursor:"pointer",letterSpacing:.2,whiteSpace:"nowrap"}}>
          🏆 Stagioni passate
        </button>
      </div>

      {/* Nome squadra editabile */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.32)",fontWeight:600,letterSpacing:.5,marginBottom:6,textTransform:"uppercase"}}>Nome della tua squadra</div>
        <input value={teamName} onChange={e=>setTeamName(e.target.value)} placeholder="es. Cerreto Basket"
          style={{width:"100%",background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:11,color:"#fff",padding:"10px 12px",fontSize:14,fontWeight:600,outline:"none",fontFamily:"inherit"}}/>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:4,lineHeight:1.4}}>Usato per riconoscere le tue partite nel PDF FIP. Non serve esatto al 100%, basta che sia contenuto nel nome ufficiale.</div>
      </div>

      {/* Pulsante svuota calendario */}
      {partite.length>0&&!previewMatches&&(
        <div style={{marginBottom:14,textAlign:"right"}}>
          <button onClick={()=>{if(confirm("Sei sicuro? Il calendario verrà svuotato."))setPartite([]);}}
            style={{background:"transparent",border:"1px solid rgba(255,77,0,0.25)",borderRadius:9,color:"rgba(255,100,0,0.6)",fontSize:11,padding:"5px 12px",cursor:"pointer",fontWeight:600}}>
            🗑 Svuota calendario
          </button>
        </div>
      )}

      {/* Pulsante import PDF */}
      <div style={{marginBottom:14}}>
        <input ref={fileInputRef} type="file" accept="application/pdf,.pdf" onChange={handleFile} style={{display:"none"}}/>
        <button onClick={()=>fileInputRef.current&&fileInputRef.current.click()} disabled={importing||!teamName.trim()}
          style={{width:"100%",padding:"12px",borderRadius:11,border:"1px dashed rgba(255,140,0,0.4)",background:"rgba(255,140,0,0.06)",color:"#ff8c00",fontSize:13,fontWeight:700,cursor:importing||!teamName.trim()?"not-allowed":"pointer",opacity:importing||!teamName.trim()?0.5:1,letterSpacing:.3}}>
          {importing?"⏳ Lettura PDF…":"📄 Importa calendario FIP da PDF"}
        </button>
      </div>

      {importMsg&&(
        <div style={{marginBottom:12,padding:"11px 13px",borderRadius:11,background:importMsg.ok?"rgba(0,218,120,0.08)":"rgba(255,70,0,0.08)",border:"1px solid "+(importMsg.ok?"rgba(0,218,120,0.22)":"rgba(255,70,0,0.22)"),color:importMsg.ok?"#00da78":"#ff6520",fontSize:12,fontWeight:600,lineHeight:1.5}}>
          {importMsg.text}
        </div>
      )}

      {/* Anteprima import */}
      {previewMatches&&(
        <div style={{marginBottom:14,padding:12,borderRadius:12,background:"rgba(255,140,0,0.05)",border:"1px solid rgba(255,140,0,0.22)"}}>
          <div style={{fontSize:11,fontWeight:700,color:"#ff8c00",marginBottom:9}}>ANTEPRIMA — {previewMatches.length} partite</div>
          <div style={{maxHeight:180,overflowY:"auto",marginBottom:10}}>
            {previewMatches.map((p,i)=>(
              <div key={i} style={{padding:"6px 0",borderBottom:i<previewMatches.length-1?"1px solid rgba(255,255,255,0.04)":"none",fontSize:11,color:"rgba(255,255,255,0.7)"}}>
                <span style={{color:"#ff8c00",fontWeight:700}}>{p.date}</span> · {p.casa?"🏠":"✈️"} vs {p.avversario}{p.ora?" · "+p.ora:""}
              </div>
            ))}
          </div>
          <div style={{fontSize:10,color:"rgba(255,140,0,0.7)",marginBottom:10,lineHeight:1.5}}>⚠ Importando, il calendario corrente verrà <b>sostituito</b>. Le partite e statistiche precedenti restano archiviate sotto la stagione vecchia.</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={cancelImport} style={{flex:1,padding:"9px",borderRadius:9,border:"1px solid rgba(255,255,255,0.08)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.55)",fontSize:12,cursor:"pointer",fontWeight:600}}>Annulla</button>
            <button onClick={confirmImport} style={{flex:2,padding:"9px",borderRadius:9,border:"none",background:"linear-gradient(135deg,#ff3500,#ff8800)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",letterSpacing:.3}}>Sostituisci calendario ✓</button>
          </div>
        </div>
      )}

      {/* Calendario partite */}
      <div style={{borderTop:"1px solid rgba(255,255,255,0.05)",paddingTop:12,marginTop:6}}>
        <div style={{fontSize:10,color:"rgba(255,255,255,0.32)",fontWeight:600,letterSpacing:.5,marginBottom:10,textTransform:"uppercase"}}>Calendario stagione corrente · {partite.length} partite</div>
        {partite.length===0&&<div style={{fontSize:12,color:"rgba(255,255,255,0.32)",textAlign:"center",padding:"16px 0"}}>Nessuna partita. Importa il PDF FIP qui sopra.</div>}

              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>

                </span>
              </div>
              <div style={{fontSize:14,fontWeight:700,color:"rgba(255,255,255,0.85)",marginBottom:10}}>vs {p.avversario}</div>

                  Risultato: {p.risultato.mia} - {p.risultato.avv} {p.risultato.mia>p.risultato.avv?"✓":p.risultato.mia<p.risultato.avv?"✗":"="}

function BackupRestore(){
  const [mode,setMode]=useState(null); // null | "export" | "import"
  const [exportText,setExportText]=useState("");
  const [importText,setImportText]=useState("");
  const [msg,setMsg]=useState(null);

  function doExport(){
    const keys={};
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(k&&k.startsWith("enea_")){try{keys[k]=JSON.parse(localStorage.getItem(k));}catch{keys[k]=localStorage.getItem(k);}}
    }
    setExportText(JSON.stringify(keys,null,2));
    setMode("export");
    setMsg(null);
  }

  function copyExport(){
    if(navigator.clipboard){navigator.clipboard.writeText(exportText).then(()=>setMsg({ok:true,text:"✓ Testo copiato! Incollalo in un file .txt o Notes."})).catch(()=>setMsg({ok:false,text:"⚠ Copia manuale: seleziona tutto il testo qui sopra."}));}
    else{setMsg({ok:false,text:"⚠ Seleziona tutto il testo e copialo manualmente."});}
  }

  function doImport(){
    try{
      const data=JSON.parse(importText.trim());
      if(typeof data!=="object"||Array.isArray(data))throw new Error("not an object");
      const entries=Object.entries(data);
      if(entries.length===0)throw new Error("empty");
      let count=0;
      let pushQueue=[];
      entries.forEach(([k,v])=>{
        try{
          // Le chiavi nel backup iniziano con "enea_". Per usare save() serve la chiave senza prefisso.
          const cleanKey=k.startsWith("enea_")?k.slice(5):k;
          // Scrive subito su localStorage
          localStorage.setItem("enea_"+cleanKey,JSON.stringify(v));
          // Push su Firebase (best-effort, asincrono)
          try{
            const cu=localStorage.getItem("enea_current_user");
            if(cu&&window.__firestore&&window.__fbHelpers){
              const {doc,setDoc}=window.__fbHelpers;
              let safe;
              try{safe=JSON.parse(JSON.stringify(v));}catch{safe=null;}
              const ref=doc(window.__firestore,"users",cu,"data",cleanKey);
              pushQueue.push(setDoc(ref,{value:safe,updatedAt:Date.now()}));
            }
          }catch{}
          count++;
        }catch{}
      });
      if(count===0)throw new Error("none saved");
      // Aspetta che tutti i push Firebase finiscano prima di mostrare il successo
      setMsg({ok:true,text:`✓ ${count} voci ripristinate! Sincronizzazione su cloud...`,reload:false});
      Promise.allSettled(pushQueue).then(()=>{
        setMsg({ok:true,text:`✓ ${count} voci ripristinate e sincronizzate. Ricarica per vedere i dati.`,reload:true});
      });
    }catch(e){
      setMsg({ok:false,text:"⚠ Testo non valido. Assicurati di incollare tutto il backup."});
    }
  }

  const tabStyle=(active)=>({flex:1,padding:"10px 0",borderRadius:10,border:"1px solid "+(active?"rgba(255,77,0,0.35)":"rgba(255,255,255,0.08)"),background:active?"rgba(255,77,0,0.12)":"rgba(255,255,255,0.03)",color:active?"#ff6a20":"rgba(255,255,255,0.4)",fontSize:13,fontWeight:700,cursor:"pointer"});

  return(
    <div>
      <div style={{fontSize:11,color:"rgba(255,255,255,0.28)",marginBottom:16,lineHeight:1.7}}>
        Esporta i tuoi dati come testo, salvalo dove vuoi. Per ripristinarli incollalo qui.
      </div>
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        <button onClick={doExport} style={tabStyle(mode==="export")}>📤 Esporta</button>
        <button onClick={()=>{setMode("import");setMsg(null);}} style={tabStyle(mode==="import")}>📥 Importa</button>
      </div>

      {mode==="export"&&exportText&&(
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",marginBottom:6,fontWeight:600}}>COPIA TUTTO QUESTO TESTO E SALVALO:</div>
          <textarea readOnly rows={8} value={exportText} onClick={e=>e.target.select()} style={{fontSize:9,lineHeight:1.4,color:"rgba(255,255,255,0.55)",background:"rgba(0,0,0,0.3)"}}/>
          <button onClick={copyExport} className="btn-p" style={{width:"100%",marginTop:8,padding:"12px",fontWeight:700}}>📋 COPIA TUTTO ✓</button>
        </div>
      )}

      {mode==="import"&&(
        <div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.28)",marginBottom:6,fontWeight:600}}>INCOLLA QUI IL TUO BACKUP:</div>
          <textarea rows={8} value={importText} onChange={e=>setImportText(e.target.value)} placeholder='Incolla qui il testo del backup...' style={{fontSize:9,lineHeight:1.4}}/>
          <button onClick={doImport} className="btn-p" style={{width:"100%",marginTop:8,padding:"12px",fontWeight:700}}>RIPRISTINA ✓</button>
        </div>
      )}

      {msg&&(
        <div style={{marginTop:12,padding:"12px 15px",borderRadius:12,background:msg.ok?"rgba(0,218,120,0.08)":"rgba(255,70,0,0.08)",border:`1px solid ${msg.ok?"rgba(0,218,120,0.22)":"rgba(255,70,0,0.22)"}`,color:msg.ok?"#00da78":"#ff6520",fontSize:13,fontWeight:600,lineHeight:1.5}}>
          {msg.text}
          {msg.reload&&<button onClick={()=>window.location.reload()} style={{display:"block",marginTop:10,width:"100%",padding:"11px",borderRadius:10,border:"none",background:"#00da78",color:"#000",fontWeight:800,cursor:"pointer",fontSize:14}}>RICARICA ORA ↺</button>}
        </div>
      )}
    </div>
  );
}

function HistoryEditor({dailyLogs,setDailyLogs,completedDays,setCompletedDays,setStreak}){
  const today=new Date();
  const [selDate,setSelDate]=useState(null);
  const [draft,setDraft]=useState(null);

  // Generate last 30 days (excluding today)
  const days=Array.from({length:30},(_,i)=>{
    const d=new Date(today);d.setDate(d.getDate()-(i+1));
    return localDateStr(d);
  });

  function openDay(date){
    const log=dailyLogs[date]||{foodStars:0,trainingDone:false,taskPct:0};
    setDraft({...log,foodStars:log.foodStars||0,trainingDone:!!log.trainingDone,taskPct:log.taskPct||0});
    setSelDate(date);
  }

  function saveDay(){
    const starVal=draft.foodStars||0;
    const mstars={};
    if(starVal>0){
      ["Colazione","Spuntino","Pranzo","Merenda","Cena"].forEach(m=>{mstars[m]=starVal;});
    }
    try{localStorage.setItem("enea_mstars_"+selDate,JSON.stringify(mstars));}catch{}

    // Fix: salva anche la chiave tdone_ usata dalla tab Training
    try{localStorage.setItem("enea_tdone_"+selDate,JSON.stringify(!!draft.trainingDone));}catch{} // fix: enea_ prefix to match load() helper

    // Un giorno è "completato" se training done oppure task>50% oppure cibo>50%
    const dayDone=draft.trainingDone||(draft.taskPct>=50)||(draft.foodStars>=3);

    const newCompletedDays={...completedDays,[selDate]:dayDone?true:undefined};
    if(!dayDone)delete newCompletedDays[selDate];
    setCompletedDays(newCompletedDays);
    try{localStorage.setItem("enea_cdays",JSON.stringify(newCompletedDays));}catch{}

    // Ricalcola streak: parte da ieri (oggi potrebbe non essere ancora completo)
    let s=0;
    const todayKey=localDateStr();
    const cur=new Date();cur.setDate(cur.getDate()-1);
    while(true){
      const dk=localDateStr(cur);
      if(newCompletedDays[dk]){s++;cur.setDate(cur.getDate()-1);}
      else break;
    }
    if(newCompletedDays[todayKey])s++;
    setStreak(s);
    try{localStorage.setItem("enea_streak",JSON.stringify(s));}catch{}

    setDailyLogs(prev=>{
      const next={...prev,[selDate]:{...prev[selDate],...draft}};
      try{localStorage.setItem("enea_dlogs",JSON.stringify(next));}catch{}
      return next;
    });
    setSelDate(null);setDraft(null);
  }

  function fmtDate(dateStr){
    const d=new Date(dateStr+"T12:00:00");
    return d.toLocaleDateString("it-IT",{weekday:"short",day:"numeric",month:"short"});
  }

  function scoreColor(v){if(v>=80)return"#00da78";if(v>=50)return"#ffcc00";return"#ff4000";}

  if(selDate&&draft){
    const foodPct=Math.round((draft.foodStars/5)*100);
    return(
      <div>
        <button onClick={()=>{setSelDate(null);setDraft(null);}} style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:9,color:"rgba(255,255,255,0.5)",fontSize:12,padding:"6px 12px",cursor:"pointer",marginBottom:14}}>← Indietro</button>
        <div style={{fontSize:13,fontWeight:700,color:"rgba(255,255,255,0.9)",marginBottom:14,textTransform:"capitalize"}}>{fmtDate(selDate)}</div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontWeight:600,letterSpacing:.5,marginBottom:8}}>🍽️ CIBO — {foodPct}%</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            {[1,2,3,4,5].map(star=>(
              <button key={star} onClick={()=>setDraft(p=>({...p,foodStars:star}))} style={{flex:1,padding:"10px 0",borderRadius:9,border:`1px solid ${draft.foodStars>=star?"rgba(255,204,0,0.4)":"rgba(255,255,255,0.07)"}`,background:draft.foodStars>=star?"rgba(255,204,0,0.12)":"rgba(255,255,255,0.03)",fontSize:18,cursor:"pointer"}}>★</button>
            ))}
          </div>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.25)",marginTop:5,textAlign:"center"}}>Tocca per impostare le stelle ({draft.foodStars}/5)</div>
        </div>

        <div style={{marginBottom:14}}>{(()=>{
          const dow2=(new Date(selDate+"T12:00:00").getDay()+6)%7;
          // Icona dal tipo del giorno personalizzato (se disponibile)
          const _cs=(() => { try { const d=localStorage.getItem('enea_custom_schedule'); return d?JSON.parse(d):null; } catch { return null; } })();
          const sched2=(_cs&&_cs[dow2])||SCHEDULE[dow2]||{};
          const isRest=sched2.type==="rest";
          return(<>
            <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontWeight:600,letterSpacing:.5,marginBottom:6}}>{sched2.icon||"💪"} TRAINING {sched2.label?<span style={{color:"rgba(255,77,0,0.7)",fontWeight:600}}>— {sched2.label}</span>:null}</div>
            {isRest
              ?<div style={{padding:"10px 14px",borderRadius:10,border:"1px solid rgba(255,255,255,0.06)",background:"rgba(255,255,255,0.02)",color:"rgba(255,255,255,0.2)",fontSize:12,textAlign:"center"}}>😴 Riposo — non conta nella media</div>
              :<button onClick={()=>setDraft(p=>({...p,trainingDone:!p.trainingDone}))} style={{width:"100%",padding:"11px",borderRadius:10,border:`1px solid ${draft.trainingDone?"rgba(0,201,126,0.35)":"rgba(255,255,255,0.08)"}`,background:draft.trainingDone?"rgba(0,201,126,0.12)":"rgba(255,255,255,0.03)",color:draft.trainingDone?"#00da78":"rgba(255,255,255,0.35)",fontSize:13,fontWeight:600,cursor:"pointer"}}>
                {draft.trainingDone?"✓ Completato":"✕ Non completato"}
              </button>
            }
          </>);
        })()}</div>

        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:"rgba(255,255,255,0.35)",fontWeight:600,letterSpacing:.5,marginBottom:8}}>✓ TASK — {draft.taskPct}%</div>
          <input type="range" min={0} max={100} step={5} value={draft.taskPct} onChange={e=>setDraft(p=>({...p,taskPct:parseInt(e.target.value)}))} style={{width:"100%",accentColor:"#ff4000"}}/>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"rgba(255,255,255,0.2)",marginTop:3}}><span>0%</span><span style={{color:scoreColor(draft.taskPct),fontWeight:600}}>{draft.taskPct}%</span><span>100%</span></div>
        </div>

        <button onClick={saveDay} className="btn-p" style={{width:"100%",padding:"12px",fontSize:14,fontWeight:700}}>SALVA GIORNO ✓</button>
      </div>
    );
  }

  return(
    <div>
      <div style={{fontSize:11,color:"rgba(255,255,255,0.3)",marginBottom:12}}>Tocca un giorno per modificare cibo, training e task.</div>
      {days.map(date=>{
        const log=dailyLogs[date];
        const hasData=log&&(log.foodStars>0||log.trainingDone||log.taskPct>0);
        const foodPct=log?Math.round(((log.foodStars||0)/5)*100):null;
        const trainOk=log?.trainingDone;
        const taskP=log?.taskPct||null;
        const _dow=(new Date(date+"T12:00:00").getDay()+6)%7;
        const _cs2=(()=>{try{const d=localStorage.getItem('enea_custom_schedule');return d?JSON.parse(d):null;}catch{return null;}})();
        const _sd=(_cs2&&_cs2[_dow])||SCHEDULE[_dow]||{};
        return(
          <button key={date} onClick={()=>openDay(date)} style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:11,padding:"11px 13px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",marginBottom:6,textAlign:"left"}}>
            <div style={{width:36,height:36,borderRadius:9,background:"rgba(255,77,0,0.08)",border:"1px solid rgba(255,77,0,0.15)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{_sd.icon||"💪"}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:13,fontWeight:600,color:"rgba(255,255,255,0.8)",textTransform:"capitalize"}}>{fmtDate(date)}</div>
              {_sd.label&&<div style={{fontSize:10,color:"rgba(255,77,0,0.7)",marginTop:1,fontWeight:500,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{_sd.label}</div>}
              {!hasData&&<div style={{fontSize:11,color:"rgba(255,255,255,0.2)",marginTop:1}}>Nessun dato</div>}
            </div>
            {hasData&&<div style={{display:"flex",gap:6,alignItems:"center"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>🍽️</div>
                <div style={{fontSize:11,fontWeight:700,color:scoreColor(foodPct)}}>{foodPct}%</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>💪</div>
                <div style={{fontSize:11,fontWeight:700,color:trainOk?"#00da78":"#ff4000"}}>{trainOk?"✓":"✕"}</div>
              </div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:10,color:"rgba(255,255,255,0.25)"}}>✓</div>
                <div style={{fontSize:11,fontWeight:700,color:scoreColor(taskP)}}>{taskP}%</div>
              </div>
            </div>}
            <span style={{color:"rgba(255,255,255,0.2)",fontSize:13}}>›</span>
          </button>
        );
      })}
    </div>
  );
}

  const [schedDraft,setSchedDraft]=useState(()=>JSON.parse(JSON.stringify(customSchedule)));
  const [mealDraft,setMealDraft]=useState(()=>JSON.parse(JSON.stringify(customMealPlan)));
  const [taskDraft,setTaskDraft]=useState(()=>tasks.map(t=>({...t})));
  const [goalDraft,setGoalDraft]=useState(()=>goals.map(g=>({...g})));
  // Stato per "replica esercizio" (fix v22 #5)
  const [replicate,setReplicate]=useState(null); // {di, exIdx, days:Set}
  // Stato per "+" inline tra task in Settings (fix v22 #3)
  const [insertAfterIdx,setInsertAfterIdx]=useState(null);
  const [insertText,setInsertText]=useState("");
  const [insertSub,setInsertSub]=useState("");
  // Stato per logout / elimina account (Firebase login)
  const [logoutConfirm,setLogoutConfirm]=useState(false);
  const [deleteConfirm,setDeleteConfirm]=useState(false);
  const [accountBusy,setAccountBusy]=useState(false);

  function doLogout(){
    setAccountBusy(true);
    if(typeof window.__logout==="function"){window.__logout();}
    else{try{localStorage.removeItem("enea_current_user");}catch{};window.location.reload();}
  }
  async function doDeleteAccount(){
    setAccountBusy(true);
    try{
      const cu=localStorage.getItem("enea_current_user");
      if(cu){
        await fbDeleteUser(cu);
        // Rimuovi dalla lista local accounts
        try{
          const list=(()=>{try{const v=localStorage.getItem("enea_local_accounts");return v?JSON.parse(v):[];}catch{return[];}})();
          const filtered=list.filter(x=>x!==cu);
          localStorage.setItem("enea_local_accounts",JSON.stringify(filtered));
        }catch{}
      }
    }catch{}
    try{localStorage.removeItem("enea_current_user");}catch{}
    if(typeof window.__logout==="function")window.__logout();
    else window.location.reload();
  }

  function saveAll(){setProfile(draft);setCustomSchedule(schedDraft);setCustomMealPlan(mealDraft);setTasks(taskDraft);setGoals(goalDraft);onClose();}

  function confirmInsertSettings(afterIdx){
    if(!insertText.trim()){setInsertAfterIdx(null);setInsertText("");setInsertSub("");return;}
    const newT={id:Date.now(),text:insertText.trim(),subtitle:insertSub.trim(),days:[0,1,2,3,4,5,6]};
    const arr=[...taskDraft];
    arr.splice(afterIdx+1,0,newT);
    setTaskDraft(arr);
    setInsertAfterIdx(null);setInsertText("");setInsertSub("");
  }

  function applyReplicate(){
    if(!replicate)return;
    const {di,exIdx,days}=replicate;
    const s=JSON.parse(JSON.stringify(schedDraft));
    const ex=s[di].exercises[exIdx];
    if(!ex){setReplicate(null);return;}
    days.forEach(targetDi=>{
      if(String(targetDi)===String(di))return; // skip stesso giorno
      if(!s[targetDi].exercises)s[targetDi].exercises=[];
      // evita duplicati esatti
      const dup=s[targetDi].exercises.some(e=>e.name===ex.name&&e.sets===ex.sets);
      if(!dup)s[targetDi].exercises.push({...ex});
    });
    setSchedDraft(s);
    setReplicate(null);
  }

    {id:"profile",  icon:"👤",label:"Dati profilo"},
    {id:"notes",    icon:"📝",label:"Note"},
    {id:"training", icon:"💪",label:"Piano allenamento"},
    {id:"nutrition",icon:"🍽️",label:"Piano alimentare"},
    {id:"tasks",    icon:"✓", label:"Task quotidiane"},
    {id:"goals",    icon:"🎯",label:"Obiettivi"},
    {id:"history",  icon:"📅",label:"Modifica giorni passati"},
    {id:"partite",  icon:"🏀",label:"Calendario Partite"},
    {id:"backup",   icon:"💾",label:"Backup / Ripristino dati"},
  ];

            <button onClick={applyReplicate} disabled={replicate.days.size===0} style={{flex:2,padding:"11px",borderRadius:10,border:"none",background:replicate.days.size===0?"rgba(255,255,255,0.06)":"linear-gradient(135deg,#0070ff,#4db8ff)",color:replicate.days.size===0?"rgba(255,255,255,0.25)":"#000",fontSize:13,fontWeight:700,cursor:replicate.days.size===0?"not-allowed":"pointer"}}>COPIA SU {replicate.days.size} GIORNI ✓</button>
          </div>
        </div>
      </div>
    )}
  </>);
}

  "Punti":"#ff4d00",
  "Assist":"#4db8ff",
  "Rimbalzi":"#00da78",
  "Palle rubate":"#ffcc00",
  "Falli":"#cc44ff",
};
const MONTHS_IT=["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

// Score generale di un giorno (food, train, task) — 0..1 o null se nessun dato
function computeDayScore(dateStr,dailyLogs){
  if(!dailyLogs||!dailyLogs[dateStr])return null;
  const log=dailyLogs[dateStr];
  const parts=[];
  // Food: usa mstars del giorno se ci sono valori (consistent con HomeTab)
  try{
    const ms=load("mstars_"+dateStr,{});
    const sm=new Set(log.skippedMeals||[]);
    const vm=["Colazione","Spuntino","Pranzo","Merenda","Cena"].filter(m=>!sm.has(m));
    const valid=vm.filter(m=>ms[m]>0);
    if(valid.length>0){
      const avg=valid.reduce((a,m)=>a+ms[m],0)/valid.length;
      parts.push((avg-1)/4); // stelle 1..5 → 0..1
    }
  }catch{}
  // Train: 0 o 1
  if(typeof log.trainingDone!=="undefined"){
    parts.push(log.trainingDone?1:0);
  }
  // Task: taskPct 0..100 → 0..1
  if(typeof log.taskPct==="number"){
    parts.push(log.taskPct/100);
  }
  if(parts.length===0)return null;
  return parts.reduce((a,b)=>a+b,0)/parts.length;
}

// ── 1) GRAFICO ANDAMENTO 30 GIORNI ──────────────────────────────────────
function StatsAndamento({dailyLogs,td}){
  const days=[];
  for(let i=29;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=localDateStr(d);
    days.push({date:ds,dom:d.getDate(),score:computeDayScore(ds,dailyLogs)});
  }
  const W=Math.max(330,days.length*11+20);
  const H=140;
  const padL=4,padR=4,padT=10,padB=22;
  const innerW=W-padL-padR;
  const innerH=H-padT-padB;
  const colW=innerW/days.length;
  const barW=Math.max(4,colW-3);
  return(
    <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:14,marginBottom:11}}>
      <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.85)",marginBottom:11}}>📈 Andamento 30 giorni</div>
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <svg width={W} height={H} style={{display:"block",minWidth:"100%"}}>
          {/* baseline */}
          <line x1={padL} y1={padT+innerH} x2={W-padR} y2={padT+innerH} stroke="rgba(255,255,255,0.08)" strokeWidth="1"/>
          {days.map((d,i)=>{
            const x=padL+i*colW+(colW-barW)/2;
            const hasData=d.score!==null;
            const h=hasData?Math.max(2,d.score*innerH):3;
            const y=padT+innerH-h;
            const fill=hasData?scoreToColor(d.score):"rgba(255,255,255,0.08)";
            const isToday=d.date===td;
            return(
              <g key={d.date}>
                <rect x={x} y={y} width={barW} height={h} rx="2" fill={fill} opacity={hasData?(isToday?1:0.92):0.5}/>
                {(i%5===0||i===days.length-1)&&(
                  <text x={x+barW/2} y={H-6} textAnchor="middle" fontSize="9" fill={isToday?"#ff8c00":"rgba(255,255,255,0.4)"} fontWeight={isToday?700:500}>
                    {isToday?"oggi":d.dom}
                  </text>
                )}
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

// ── 2) GRAFICO CONFRONTO SETTIMANA ATTUALE VS SCORSA ────────────────────
function StatsWeekCompare({dailyLogs,td}){
  // Lunedì della settimana corrente
  const now=new Date();
  const monThis=new Date(now);monThis.setDate(now.getDate()-((now.getDay()+6)%7));
  const monLast=new Date(monThis);monLast.setDate(monThis.getDate()-7);
  const dowToday=(now.getDay()+6)%7;
  const items=Array.from({length:7},(_,i)=>{
    const a=new Date(monThis);a.setDate(monThis.getDate()+i);
    const b=new Date(monLast);b.setDate(monLast.getDate()+i);
    const aStr=localDateStr(a),bStr=localDateStr(b);
    return{
      i,letter:DAYS_LETTER[i],
      aFuture:a>now,
      thisScore:computeDayScore(aStr,dailyLogs),
      lastScore:computeDayScore(bStr,dailyLogs),
    };
  });
  const W=340,H=140;
  const padL=8,padR=8,padT=10,padB=24;
  const innerW=W-padL-padR;
  const innerH=H-padT-padB;
  const groupW=innerW/7;
  const barW=Math.min(13,(groupW-6)/2);
  return(
    <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:14,marginBottom:11}}>
      <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.85)",marginBottom:8}}>📊 Questa settimana vs scorsa</div>
      <div style={{display:"flex",alignItems:"center",gap:11,marginBottom:10,fontSize:10,color:"rgba(255,255,255,0.55)"}}>
        <span><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"#ff4d00",marginRight:5,verticalAlign:"middle"}}/>Questa settimana</span>
        <span><span style={{display:"inline-block",width:8,height:8,borderRadius:"50%",background:"rgba(255,255,255,0.35)",marginRight:5,verticalAlign:"middle"}}/>Scorsa</span>
      </div>
      <div style={{overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
        <svg width={W} height={H} style={{display:"block",minWidth:"100%"}}>
          <line x1={padL} y1={padT+innerH} x2={W-padR} y2={padT+innerH} stroke="rgba(255,255,255,0.08)" strokeWidth="1"/>
          {items.map(it=>{
            const cx=padL+it.i*groupW+groupW/2;
            const hThis=it.thisScore!==null?Math.max(2,it.thisScore*innerH):0;
            const hLast=it.lastScore!==null?Math.max(2,it.lastScore*innerH):0;
            const xThis=cx-barW-1.5;
            const xLast=cx+1.5;
            return(
              <g key={it.i}>
                {hThis>0&&<rect x={xThis} y={padT+innerH-hThis} width={barW} height={hThis} rx="2" fill="#ff4d00"/>}
                {hLast>0&&<rect x={xLast} y={padT+innerH-hLast} width={barW} height={hLast} rx="2" fill="rgba(255,255,255,0.22)"/>}
                <text x={cx} y={H-7} textAnchor="middle" fontSize="11" fill={it.i===dowToday?"#fff":"rgba(255,255,255,0.4)"} fontWeight={it.i===dowToday?700:500}>{it.letter}</text>
              </g>
            );
          })}
        </svg>
      </div>
    </div>
  );
}

// ── 3) RECORD MENSILI ───────────────────────────────────────────────────
function StatsRecords(){
  const today=new Date();
  function monthKey(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");}
  const currentMK=monthKey(today);
  const [viewYM,setViewYM]=useState(currentMK);
  const [records,setRecords]=useState(()=>load("records",{}));
  const [adding,setAdding]=useState(false);
  const [newLabel,setNewLabel]=useState("");

  // Pre-popolamento del mese corrente: copia record attivi del mese precedente
  useEffect(()=>{
    setRecords(prev=>{
      if(prev[currentMK])return prev;
      // Trova il mese precedente con dati
      const prevDate=new Date(today.getFullYear(),today.getMonth()-1,1);
      const prevMK=monthKey(prevDate);
      const prevRecs=prev[prevMK];
      const seeded=Array.isArray(prevRecs)
        ?prevRecs.filter(r=>r.active).map(r=>({id:String(Date.now())+Math.random().toString(36).slice(2,6),label:r.label,value:0,active:true}))
        :[];
      const next={...prev,[currentMK]:seeded};
      save("records",next);
      return next;
    });
  // eslint-disable-next-line
  },[currentMK]);

  useEffect(()=>{save("records",records);},[records]);

  function changeMonth(delta){
    const [y,m]=viewYM.split("-").map(Number);
    const d=new Date(y,m-1+delta,1);
    setViewYM(monthKey(d));
    setAdding(false);setNewLabel("");
  }

  const isCurrent=viewYM===currentMK;
  const list=records[viewYM]||[];
  const [yy,mm]=viewYM.split("-").map(Number);
  const monthLabel=MONTHS_IT[mm-1]+" "+yy;

  // ── BANNER PROMEMORIA fine/inizio mese ──────────────────────────────
  // Stato dismissione (per non riapparire nel medesimo contesto)
  const [bannerDismissed,setBannerDismissed]=useState(()=>load("records_banner_dismissed",{}));
  useEffect(()=>{save("records_banner_dismissed",bannerDismissed);},[bannerDismissed]);

  function getBanner(){
    // Mostra solo se siamo sul mese corrente
    if(!isCurrent)return null;
    const day=today.getDate();
    const lastDayOfMonth=new Date(today.getFullYear(),today.getMonth()+1,0).getDate();
    const daysToEnd=lastDayOfMonth-day;

    // CASO A: ultimi 3 giorni del mese — invita ad aggiornare i record di QUESTO mese
    if(daysToEnd<=2){
      const key="end_"+currentMK;
      if(bannerDismissed[key])return null;
      // Mostra solo se ci sono record da aggiornare (almeno uno attivo)
      const cur=records[currentMK]||[];
      const hasActive=cur.some(r=>r.active);
      if(!hasActive)return null;
      return{
        key,
        type:"end",
        title:daysToEnd===0?"⏰ Ultimo giorno del mese!":"⏰ Il mese sta per finire",
        text:daysToEnd===0
          ?"Aggiorna i tuoi record di "+MONTHS_IT[today.getMonth()].toLowerCase()+" prima di stanotte."
          :"Mancano "+(daysToEnd+1)+" giorni alla fine di "+MONTHS_IT[today.getMonth()].toLowerCase()+". Ricontrolla i tuoi record!",
      };
    }

    // CASO B: primi 5 giorni del mese nuovo — invita a controllare quelli appena pre-popolati
    if(day<=5){
      const key="start_"+currentMK;
      if(bannerDismissed[key])return null;
      const cur=records[currentMK]||[];
      // Mostra solo se ci sono record attivi e tutti hanno valore 0 (= appena pre-popolati, non ancora compilati)
      const hasActive=cur.some(r=>r.active);
      if(!hasActive)return null;
      const allZero=cur.filter(r=>r.active).every(r=>!r.value||r.value===0);
      if(!allZero)return null;
      const prevDate=new Date(today.getFullYear(),today.getMonth()-1,1);
      const prevMonthName=MONTHS_IT[prevDate.getMonth()];
      return{
        key,
        type:"start",
        title:"🆕 Nuovo mese!",
        text:"I record sono stati copiati da "+prevMonthName.toLowerCase()+". Aggiorna i tuoi nuovi obiettivi per "+MONTHS_IT[today.getMonth()].toLowerCase()+".",
      };
    }
    return null;
  }
  const banner=getBanner();

  function updateValue(id,val){
    const v=val===""?0:Number(val);
    setRecords(prev=>({...prev,[viewYM]:(prev[viewYM]||[]).map(r=>r.id===id?{...r,value:isNaN(v)?0:v}:r)}));
  }
  function toggleActive(id){
    setRecords(prev=>({...prev,[viewYM]:(prev[viewYM]||[]).map(r=>r.id===id?{...r,active:!r.active}:r)}));
  }
  function removeRecord(id){
    setRecords(prev=>({...prev,[viewYM]:(prev[viewYM]||[]).filter(r=>r.id!==id)}));
  }
  function addRecord(){
    const label=newLabel.trim();
    if(!label)return;
    const newR={id:String(Date.now())+Math.random().toString(36).slice(2,6),label,value:0,active:true};
    setRecords(prev=>({...prev,[viewYM]:[...(prev[viewYM]||[]),newR]}));
    setNewLabel("");setAdding(false);
  }

  return(
    <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:14,marginBottom:11}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11}}>
        <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.85)"}}>🏆 Record mensili</div>
      </div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:11,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:11,padding:"6px 10px"}}>
        <button onClick={()=>changeMonth(-1)} style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.55)",fontSize:18,cursor:"pointer",padding:"2px 8px"}}>‹</button>
        <div style={{fontSize:12,fontWeight:700,color:"rgba(255,255,255,0.85)"}}>{monthLabel}{!isCurrent&&<span style={{fontSize:9,color:"rgba(255,255,255,0.35)",marginLeft:6,fontWeight:500}}>(archivio)</span>}</div>
        <button onClick={()=>changeMonth(1)} disabled={viewYM>=currentMK} style={{background:"transparent",border:"none",color:viewYM>=currentMK?"rgba(255,255,255,0.15)":"rgba(255,255,255,0.55)",fontSize:18,cursor:viewYM>=currentMK?"not-allowed":"pointer",padding:"2px 8px"}}>›</button>
      </div>
      {banner&&(
        <div style={{
          background:banner.type==="end"?"linear-gradient(135deg,rgba(255,77,0,0.13),rgba(255,140,0,0.06))":"linear-gradient(135deg,rgba(0,218,120,0.13),rgba(77,184,255,0.05))",
          border:"1px solid "+(banner.type==="end"?"rgba(255,77,0,0.32)":"rgba(0,218,120,0.28)"),
          borderRadius:12,padding:"11px 12px",marginBottom:11,
          display:"flex",alignItems:"flex-start",gap:9
        }}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:700,color:banner.type==="end"?"#ff8c00":"#00da78",marginBottom:3}}>{banner.title}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,0.7)",lineHeight:1.4}}>{banner.text}</div>
          </div>
          <button onClick={()=>setBannerDismissed(p=>({...p,[banner.key]:true}))}
            title="Chiudi"
            style={{background:"transparent",border:"none",color:"rgba(255,255,255,0.35)",fontSize:15,cursor:"pointer",padding:"0 4px",flexShrink:0,lineHeight:1}}>✕</button>
        </div>
      )}
      {list.length===0&&!adding&&(
        <div style={{fontSize:12,color:"rgba(255,255,255,0.32)",textAlign:"center",padding:"14px 0"}}>{isCurrent?"Nessun record. Aggiungine uno!":"Nessun record per questo mese."}</div>
      )}
      {list.map(r=>(
        <div key={r.id} style={{display:"flex",alignItems:"center",gap:9,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",opacity:r.active?1:0.45}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:"rgba(255,255,255,0.85)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.label}</div>
            {!r.active&&<div style={{fontSize:9,color:"rgba(255,255,255,0.35)",marginTop:1}}>disattivato</div>}
          </div>
          {isCurrent?(
            <input type="number" value={r.value||""} onChange={e=>updateValue(r.id,e.target.value)} placeholder="0"
              style={{width:70,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,color:"#ff8c00",padding:"6px 8px",fontSize:13,fontWeight:700,outline:"none",textAlign:"right",fontFamily:"var(--font-mono)"}}/>
          ):(
            <div style={{fontSize:14,fontWeight:700,color:r.active?"#ff8c00":"rgba(255,255,255,0.4)",fontFamily:"var(--font-mono)",minWidth:50,textAlign:"right"}}>{r.value||0}</div>
          )}
          {isCurrent&&(
            <>
              <button onClick={()=>toggleActive(r.id)} title={r.active?"Disattiva":"Attiva"}
                style={{background:r.active?"rgba(0,218,120,0.1)":"rgba(255,255,255,0.04)",border:"1px solid "+(r.active?"rgba(0,218,120,0.25)":"rgba(255,255,255,0.07)"),borderRadius:7,color:r.active?"#00da78":"rgba(255,255,255,0.3)",fontSize:12,padding:"4px 7px",cursor:"pointer"}}>
                {r.active?"👁":"🚫"}
              </button>
              <button onClick={()=>removeRecord(r.id)} title="Elimina"
                style={{background:"rgba(255,77,0,0.06)",border:"1px solid rgba(255,77,0,0.15)",borderRadius:7,color:"rgba(255,77,0,0.6)",fontSize:11,padding:"4px 7px",cursor:"pointer"}}>✕</button>
            </>
          )}
        </div>
      ))}
      {isCurrent&&(adding?(
        <div style={{marginTop:10,display:"flex",gap:6}}>
          <input autoFocus value={newLabel} onChange={e=>setNewLabel(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&addRecord()}
            placeholder="es. Max push-ups"
            style={{flex:1,background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,color:"#fff",padding:"8px 11px",fontSize:13,outline:"none"}}/>
          <button onClick={addRecord} style={{background:"linear-gradient(135deg,#ff3500,#ff8800)",border:"none",borderRadius:9,color:"#fff",fontSize:12,fontWeight:700,padding:"8px 14px",cursor:"pointer"}}>OK</button>
          <button onClick={()=>{setAdding(false);setNewLabel("");}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:9,color:"rgba(255,255,255,0.45)",fontSize:12,padding:"8px 11px",cursor:"pointer"}}>✕</button>
        </div>
      ):(
        <button onClick={()=>setAdding(true)} style={{marginTop:10,width:"100%",background:"rgba(255,77,0,0.05)",border:"1px dashed rgba(255,77,0,0.25)",borderRadius:9,color:"#ff8c00",fontSize:12,fontWeight:600,padding:"8px",cursor:"pointer"}}>+ Aggiungi record</button>
      ))}
    </div>
  );
}

// ── 4) STATISTICHE PARTITE ──────────────────────────────────────────────
function StatsPartite(){
  const [games,setGames]=useState(()=>load("game_stats",[]));
  const [currentSeason,setCurrentSeason]=useState(()=>load("current_season",1));
  const [navIdx,setNavIdx]=useState(0); // 0 = ultima
  const [chartMode,setChartMode]=useState("Ultima vs Penultima");
  const [seasonConfirm,setSeasonConfirm]=useState(false);

  useEffect(()=>{save("game_stats",games);},[games]);
  useEffect(()=>{save("current_season",currentSeason);},[currentSeason]);

  // Sortate dalla più recente alla più vecchia (TUTTE, non solo stagione corrente, per nav)
  const sorted=[...games].sort((a,b)=>b.date.localeCompare(a.date));
  const seasonGames=sorted.filter(g=>(g.season||1)===currentSeason);
  // Per il chart: solo stagione corrente, non skipped, ordinate cronologicamente
  const chartGames=seasonGames.filter(g=>!g.skipped).sort((a,b)=>a.date.localeCompare(b.date));

  // Reset nav se l'indice diventa invalido (es. dopo eliminazione partita)
  useEffect(()=>{
    if(navIdx>=sorted.length&&sorted.length>0)setNavIdx(0);
  },[sorted.length,navIdx]);

  const cur=sorted[navIdx];
  // numero progressivo della partita IN tutta la storia (non per stagione)
  const matchNumber=cur?(games.filter(g=>g.date<cur.date||(g.date===cur.date&&g.id<cur.id)).length+1):0;

  function formatDate(ds){
    if(!ds)return "";
    const [y,m,d]=ds.split("-").map(Number);
    return d+" "+MONTHS_IT[m-1]+" "+y;
  }

  function newSeason(){
    setCurrentSeason(s=>s+1);
    setSeasonConfirm(false);
  }

  // ── LINE CHART ──────────────────────────────────────────────────────
  function buildChartData(){
    if(chartGames.length===0)return{games:[],averages:{}};
    if(chartMode==="Ultima vs Penultima"){
      const last=chartGames[chartGames.length-1];
      const prev=chartGames[chartGames.length-2];
      const arr=prev?[prev,last]:[last];
      return{games:arr,averages:{}};
    }
    if(chartMode==="Ultima vs Prima"){
      const first=chartGames[0];
      const last=chartGames[chartGames.length-1];
      if(chartGames.length===1)return{games:[last],averages:{}};
      return{games:[first,last],averages:{}};
    }
    // Media
    const averages={};
    STAT_KEYS.forEach(k=>{
      const vals=chartGames.map(g=>g.stats?.[k]).filter(v=>typeof v==="number");
      if(vals.length>0)averages[k]=vals.reduce((a,b)=>a+b,0)/vals.length;
    });
    return{games:chartGames,averages};
  }
  const chartData=buildChartData();

  // calcola scala Y
  const allValues=[];
  chartData.games.forEach(g=>{
    STAT_KEYS.forEach(k=>{
      const v=g.stats?.[k];
      if(typeof v==="number")allValues.push(v);
    });
  });
  Object.values(chartData.averages).forEach(v=>allValues.push(v));
  const maxV=allValues.length>0?Math.max(...allValues,1):10;
  const minV=0;
  const yMax=Math.max(maxV,1);

  const W=Math.max(310,chartData.games.length*45+60);
  const H=180;
  const padL=30,padR=12,padT=10,padB=22;
  const innerW=W-padL-padR;
  const innerH=H-padT-padB;
  function xFor(i){
    const n=chartData.games.length;
    if(n<=1)return padL+innerW/2;
    return padL+(i/(n-1))*innerW;
  }
  function yFor(v){
    if(typeof v!=="number")return null;
    return padT+innerH-(v/yMax)*innerH;
  }
  const yTicks=[0,Math.round(yMax/3),Math.round(yMax*2/3),Math.round(yMax)].filter((v,i,a)=>a.indexOf(v)===i);

  return(
    <div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:14,marginBottom:11}}>
